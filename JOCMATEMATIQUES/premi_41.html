<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premi #41: SUMA RÀPIDA</title>
    <style>
        :root { --primary: #10b981; --bg: #020617; --surface: #1e293b; --accent: #22d3ee; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; user-select: none; }
        #header { position: absolute; top:0; left:0; width:100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items:center; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--primary); box-sizing: border-box; z-index: 100; }
        #game { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #064e3b 0%, #020617 100%); }
        #question { font-size: 5rem; font-weight: bold; margin-bottom: 40px; color: white; text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 500px; }
        .opt { background: var(--surface); border: 2px solid var(--primary); padding: 20px; font-size: 2rem; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .opt:hover { background: var(--primary); color: var(--bg); transform: translateY(-5px); }
        .opt:active { transform: scale(0.95); }
        #stats { position: absolute; top: 100px; font-size: 1.5rem; color: var(--accent); }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; text-align:center; }
        .prize-box { background: var(--surface); padding: 30px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; }
        button.reset { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">#41: SUMA RÀPIDA</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="timer" style="font-family: monospace; font-size: 1.2rem;">02:00</div>
            <button class="reset" onclick="location.reload()">Reiniciar</button>
        </div>
    </div>
    <div id="game">
        <div id="stats">Punts: 0 / 10</div>
        <div id="question">2 + 2</div>
        <div class="options" id="options"></div>
    </div>
    <div id="overlay">
        <h2>MENT BRIL·LANT!</h2>
        <div class="prize-box">
            <p>PREMI Nº</p>
            <h1 style="font-size: 5rem; color: var(--accent); margin: 0;">41</h1>
        </div>
        <p>+10 PUNTS</p>
        <button class="reset" onclick="location.reload()">Juga de nou</button>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type="sine", dur=0.1) {
            try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur); o.start(); o.stop(audioCtx.currentTime+dur); } catch(e){}
        }

        let score = 0, timeLeft = 120, gameActive = true, correctAnswer = 0;
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const statsEl = document.getElementById('stats');
        const overlay = document.getElementById('overlay');

        function generateQuestion() {
            const a = Math.floor(Math.random() * (10 + score * 2)) + 1;
            const b = Math.floor(Math.random() * (10 + score * 2)) + 1;
            correctAnswer = a + b;
            questionEl.innerText = `${a} + ${b}`;
            
            let choices = [correctAnswer];
            while(choices.length < 4) {
                const wrong = correctAnswer + (Math.floor(Math.random() * 10) - 5);
                if(wrong > 0 && !choices.includes(wrong)) choices.push(wrong);
            }
            choices.sort(() => Math.random() - 0.5);

            optionsEl.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'opt';
                btn.innerText = c;
                btn.onclick = () => check(c);
                optionsEl.appendChild(btn);
            });
        }

        function check(val) {
            if(!gameActive) return;
            if(val === correctAnswer) {
                score++;
                playSfx(600, "sine", 0.1);
                statsEl.innerText = `Punts: ${score} / 10`;
                if(score >= 10) win();
                else generateQuestion();
            } else {
                playSfx(150, "sawtooth", 0.2);
            }
        }

        function win() {
            gameActive = false;
            playSfx(800, "sine", 0.5);
            overlay.style.display = 'flex';
            window.parent.postMessage("joc_finalitzat", "*");
        }

        const timer = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timer); win(); }
        }, 1000);

        generateQuestion();
    </script>
</body>
</html>
