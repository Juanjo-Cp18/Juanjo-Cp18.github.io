<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premi #28: QUIN COLOR ÉS?</title>
    <style>
        :root {
            --primary: #22d3ee;
            --secondary: #a5b4fc;
            --accent: #f472b6;
            --bg: #020617;
            --surface: #1e293b;
            --correct: #22c55e;
            --wrong: #ef4444;
            --neon-glow: 0 0 15px rgba(34, 211, 238, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }

        #header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 2px solid var(--primary);
            z-index: 100;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        .stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .timer, .progress {
            font-family: monospace;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            position: relative;
        }

        .instruction {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--secondary);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        #target-display {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 20px;
        }

        .color-btns {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .color-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid rgba(255,255,255,0.3);
            transition: all 0.2s ease;
            position: relative;
        }

        .color-btn:hover {
            transform: scale(1.1);
            border-color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        #feedback-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
            transition: opacity 0.1s;
        }

        button.reset-btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }

        .prize-box {
            background: var(--surface);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(244, 114, 182, 0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div class="title">QUIN COLOR ÉS?</div>
            <div class="stats">
                <div class="progress">Encerts: <span id="hits">0</span>/10</div>
                <div class="timer" id="timer">02:00</div>
                <button class="reset-btn" onclick="location.reload()">Reiniciar</button>
            </div>
        </div>

        <div id="feedback-flash"></div>

        <div id="main">
            <div class="instruction">Clica el cercle del mateix color!</div>
            <div id="target-display"></div>
            <div class="color-btns">
                <div class="color-btn" style="background:#ef4444" onclick="check('red')"></div>
                <div class="color-btn" style="background:#22c55e" onclick="check('green')"></div>
                <div class="color-btn" style="background:#3b82f6" onclick="check('blue')"></div>
                <div class="color-btn" style="background:#eab308" onclick="check('yellow')"></div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h2 style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;">MOLES MOLT!</h2>
        <div class="prize-box">
            <p style="margin: 0; font-size: 1.2rem;">HAS ACONSEGUIT EL PREMI Nº</p>
            <h1 style="font-size: 5rem; margin: 10px 0; color: var(--accent);">28</h1>
        </div>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">+10 PUNTS ACONSEGUITS</p>
        <button class="reset-btn" style="padding: 15px 30px; font-size: 1.2rem;" onclick="location.reload()">Jugar de nou</button>
    </div>

    <script>
        const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        function playSound(f, type="sine", duration=0.1) {
            try {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = type; o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                o.start(); o.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const colors = {
            red: '#ef4444',
            green: '#22c55e',
            blue: '#3b82f6',
            yellow: '#eab308'
        };
        const colorKeys = Object.keys(colors);
        let currentTarget = '';
        let hits = 0;
        let timeLeft = 120;
        let gameActive = true;

        const targetEl = document.getElementById('target-display');
        const hitsEl = document.getElementById('hits');
        const timerEl = document.getElementById('timer');
        const flashEl = document.getElementById('feedback-flash');
        const overlay = document.getElementById('overlay');

        function next() {
            const oldTarget = currentTarget;
            do {
                currentTarget = colorKeys[Math.floor(Math.random() * colorKeys.length)];
            } while (currentTarget === oldTarget);
            
            targetEl.style.backgroundColor = colors[currentTarget];
            targetEl.style.transform = 'scale(1.1)';
            setTimeout(() => targetEl.style.transform = 'scale(1)', 100);
        }

        function check(color) {
            if (!gameActive) return;

            if (color === currentTarget) {
                hits++;
                hitsEl.innerText = hits;
                playSound(600, "sine", 0.1);
                showFlash(colors.green);
                
                if (hits >= 10) {
                    win();
                } else {
                    next();
                }
            } else {
                playSound(150, "sawtooth", 0.2);
                showFlash(colors.red);
                targetEl.style.animation = 'shake 0.2s ease-in-out';
                setTimeout(() => targetEl.style.animation = '', 200);
            }
        }

        function showFlash(color) {
            flashEl.style.backgroundColor = color;
            flashEl.style.opacity = '0.3';
            setTimeout(() => flashEl.style.opacity = '0', 150);
        }

        function win() {
            gameActive = false;
            playSound(800, "triangle", 0.5);
            setTimeout(() => playSound(1000, "triangle", 0.5), 200);
            overlay.style.display = 'flex';
            window.parent.postMessage("joc_finalitzat", "*");
        }

        // Timer
        const timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerEl.innerText = `${m}:${s.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (hits >= 5) win(); // Compassionate win
                else location.reload();
            }
        }, 1000);

        next();
    </script>
</body>
</html>
