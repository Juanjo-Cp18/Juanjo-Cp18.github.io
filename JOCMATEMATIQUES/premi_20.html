<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8"><style>
    :root { --nc:#22d3ee; --np:#a5b4fc; --db:#020617; }
    body { margin:0; background:var(--db); color:white; font-family:sans-serif; }
    #header { padding:10px; display:flex; justify-content:space-between; border-bottom:2px solid var(--nc); }
    #game { padding:30px; display:flex; flex-direction:column; align-items:center; gap:20px; }
    .sum { font-size:50px; color:var(--nc); }
    .input { font-size:40px; width:100px; background:none; border:2px solid var(--np); color:white; text-align:center; border-radius:10px; }
    button { background:var(--np); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold; }
    </style></head>
<body>
    <div id="header"><div>Premi #20: SUMA ESPACIAL!</div><div style="display:flex;gap:15px;align-items:center;"><button onclick="location.reload()">REINICIAR</button><div id="t">02:00</div></div></div>
    <div id="game"><div class="sum">5 + 3 = ?</div><input type="number" class="input" id="ans" oninput="check()"><button onclick="check()" style="margin-top:10px;padding:10px 20px;">OK</button></div>
    <script>
    const audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    function playSound(f){ try{const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1);}catch(e){} }
    let tl=120; function check(){ if(document.getElementById('ans').value == "8"){ playSound(800); window.parent.postMessage("joc_finalitzat","*"); } }
    setInterval(()=>{ const m=Math.floor(tl/60),s=tl%60; const tEl=document.getElementById('t'); if(tEl) tEl.innerText=`${m}:${s.toString().padStart(2,'0')}`; if(tl--<=0) window.parent.postMessage("joc_finalitzat","*"); },1000);
    </script>
</body></html>
