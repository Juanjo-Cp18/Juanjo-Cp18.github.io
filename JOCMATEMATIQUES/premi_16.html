<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8"><style>
    :root { --nc:#22d3ee; --np:#a5b4fc; --db:#020617; }
    body { margin:0; background:var(--db); color:white; font-family:sans-serif; }
    #header { padding:10px; display:flex; justify-content:space-between; border-bottom:2px solid var(--nc); }
    #grid { display:grid; grid-template-columns:repeat(4, 60px); gap:10px; justify-content:center; margin-top:20px; }
    .card { width:60px; height:60px; background:#1e293b; border-radius:8px; font-size:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    button { background:var(--np); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold; }
    </style></head>
<body>
    <div id="header"><div>Premi #16: MEMÒRIA II!</div><div style="display:flex;gap:15px;align-items:center;"><button onclick="location.reload()">REINICIAR</button><div id="t">02:00</div></div></div>
    <div id="grid"></div>
    <script>
    const audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    function playSound(f){ try{const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1);}catch(e){} }
    let tl=120, sel=[], pairs=0; const ics=['🛸','🌔','🛰️','🤖','☄️','🌌','🛸','🌔','🛰️','🤖','☄️','🌌'].sort(()=>Math.random()-0.5);
    ics.forEach(ic=>{
        const c=document.createElement('div'); c.className='card'; c.onclick=()=>{
            if(sel.length<2 && !c.innerText){ playSound(400); c.innerText=ic; sel.push(c);
                if(sel.length===2){ if(sel[0].innerText===sel[1].innerText){playSound(600); pairs++; if(pairs===6){playSound(800); setTimeout(()=>window.parent.postMessage("joc_finalitzat","*"),500);} sel=[];}
                else{ setTimeout(()=>{playSound(100); sel.forEach(x=>x.innerText=''); sel=[];},500); } }
            }
        }; document.getElementById('grid').appendChild(c);
    });
    setInterval(()=>{ const m=Math.floor(tl/60),s=tl%60; const tEl=document.getElementById('t'); if(tEl) tEl.innerText=`${m}:${s.toString().padStart(2,'0')}`; if(tl--<=0) window.parent.postMessage("joc_finalitzat","*"); },1000);
    </script>
</body></html>
