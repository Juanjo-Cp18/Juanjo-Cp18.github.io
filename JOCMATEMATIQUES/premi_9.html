<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8"><style>
    :root { --nc:#22d3ee; --np:#a5b4fc; --db:#020617; }
    body { margin: 0; background: var(--db); overflow: hidden; color: white; font-family: sans-serif; }
    #header { padding: 10px 20px; background: rgba(30, 41, 59, 0.8); display: flex; justify-content: space-between; border-bottom: 2px solid var(--nc); box-sizing: border-box; }
    #game { width: 100vw; height: calc(100vh - 50px); position: relative; }
    .alien { position: absolute; font-size: 50px; cursor: pointer; transition: 0.3s ease-out; }
    button { background: var(--np); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style></head>
<body>
    <div id="header"><div>Premi #9: ATRAPA L'ALIEN!</div><div style="display:flex;gap:15px;align-items:center;"><button onclick="location.reload()">REINICIAR</button><div id="t">02:00</div></div></div>
    <div id="game"><div id="alien" class="alien">👽</div></div>
    <script>
    const audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    function playSound(f){ try{const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1);}catch(e){} }
    const a=document.getElementById('alien'); let cnt=0, tl=120;
    function move(){ a.style.left=Math.random()*80+'vw'; a.style.top=Math.random()*70+'vh'; }
    a.onclick=()=>{ playSound(500); cnt++; if(cnt>=5){ playSound(800); window.parent.postMessage("joc_finalitzat","*"); } move(); };
    setInterval(()=>{ const m=Math.floor(tl/60),s=tl%60; const tEl=document.getElementById('t'); if(tEl) tEl.innerText=`${m}:${s.toString().padStart(2,'0')}`; if(tl--<=0) window.parent.postMessage("joc_finalitzat","*"); },1000);
    setInterval(move, 1200); move();
    </script>
</body></html>
