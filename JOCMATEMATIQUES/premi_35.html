<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premi #35: PATRÓ VISUAL</title>
    <style>
        :root { --p1: #ef4444; --p2: #22c55e; --p3: #3b82f6; --p4: #eab308; --bg: #020617; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; user-select: none; }
        #header { position: absolute; top:0; left:0; width:100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items:center; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid white; box-sizing: border-box; z-index: 100; }
        #game { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1e1b4b 0%, #020617 100%); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { width: 140px; height: 140px; border-radius: 20px; cursor: pointer; opacity: 0.3; transition: all 0.2s; border: 4px solid rgba(255,255,255,0.1); }
        .box.active { opacity: 1; transform: scale(1.05); box-shadow: 0 0 40px currentColor; }
        #msg { margin-bottom: 30px; font-size: 1.5rem; font-weight: bold; color: #a5b4fc; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; text-align:center; }
        .prize-box { background: #1e293b; padding: 30px; border-radius: 15px; border: 2px solid #f472b6; margin-bottom: 20px; }
        button { background: white; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">#35: PATRÓ VISUAL</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="timer" style="font-family: monospace; font-size: 1.2rem;">02:00</div>
            <button onclick="location.reload()">Reiniciar</button>
        </div>
    </div>
    <div id="game">
        <div id="msg">OBSERVA EL PATRÓ...</div>
        <div class="grid">
            <div id="b0" class="box" style="background: var(--p1); color: var(--p1)" onclick="tap(0)"></div>
            <div id="b1" class="box" style="background: var(--p2); color: var(--p2)" onclick="tap(1)"></div>
            <div id="b2" class="box" style="background: var(--p3); color: var(--p3)" onclick="tap(2)"></div>
            <div id="b3" class="box" style="background: var(--p4); color: var(--p4)" onclick="tap(3)"></div>
        </div>
    </div>
    <div id="overlay">
        <h2>MEMÒRIA DE TITANI!</h2>
        <div class="prize-box">
            <p>PREMI Nº</p>
            <h1 style="font-size: 5rem; color: #f472b6; margin: 0;">35</h1>
        </div>
        <p>+10 PUNTS</p>
        <button onclick="location.reload()">Torna a provar</button>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type="sine", dur=0.1) {
            try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur); o.start(); o.stop(audioCtx.currentTime+dur); } catch(e){}
        }

        let sequence = [], userSeq = [], canTap = false, level = 1, timeLeft = 120, gameActive = true;
        const msg = document.getElementById('msg');
        const overlay = document.getElementById('overlay');

        function startLevel() {
            userSeq = [];
            canTap = false;
            msg.innerText = "OBSERVA...";
            sequence.push(Math.floor(Math.random() * 4));
            playSequence();
        }

        async function playSequence() {
            for(let id of sequence) {
                await flash(id);
                await new Promise(r => setTimeout(r, 200));
            }
            msg.innerText = "REPETEIX!";
            canTap = true;
        }

        function flash(id) {
            return new Promise(r => {
                const el = document.getElementById('b' + id);
                el.classList.add('active');
                playSfx(300 + id * 100, "sine", 0.3);
                setTimeout(() => {
                    el.classList.remove('active');
                    r();
                }, 400);
            });
        }

        function tap(id) {
            if(!canTap || !gameActive) return;
            userSeq.push(id);
            flash(id);
            const idx = userSeq.length - 1;
            if(userSeq[idx] !== sequence[idx]) {
                playSfx(100, "square", 0.3);
                msg.innerText = "ERROR! REINICIANT...";
                setTimeout(() => { sequence = []; startLevel(); }, 1000);
                return;
            }
            if(userSeq.length === sequence.length) {
                level++;
                if(level > 5) win();
                else setTimeout(startLevel, 800);
            }
        }

        function win() {
            gameActive = false;
            playSfx(800, "sine", 0.5);
            overlay.style.display = 'flex';
            window.parent.postMessage("joc_finalitzat", "*");
        }

        const timer = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timer); win(); }
        }, 1000);

        setTimeout(startLevel, 1000);
    </script>
</body>
</html>
