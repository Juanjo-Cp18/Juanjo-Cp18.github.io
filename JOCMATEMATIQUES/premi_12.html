<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8"><style>
    :root { --nc:#22d3ee; --np:#a5b4fc; --db:#020617; }
    body { margin:0; background:var(--db); color:white; font-family:sans-serif; }
    #header { padding:10px; display:flex; justify-content:space-between; border-bottom:2px solid var(--nc); }
    #game { position:relative; height:300px; display:flex; justify-content:center; align-items:center; font-size:100px; opacity:0.2; }
    .parts { display:flex; justify-content:center; gap:20px; font-size:50px; }
    .part { cursor:pointer; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px; }
    button { background:var(--np); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold; }
    </style></head>
<body>
    <div id="header"><div>Premi #12: REPARA EL SATÈL·LIT!</div><div style="display:flex;gap:15px;align-items:center;"><button onclick="location.reload()">REINICIAR</button><div id="t">02:00</div></div></div>
    <div id="game">🛰️</div>
    <div class="parts"><div class="part" onclick="fix(this)">📡</div><div class="part" onclick="fix(this)">🔋</div><div class="part" onclick="fix(this)">🔩</div><div class="part" onclick="fix(this)">💻</div></div>
    <script>
    const audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    function playSound(f){ try{const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1);}catch(e){} }
    let tl=120, fixed=0;
    function fix(el){ playSound(500); el.style.visibility='hidden'; fixed++; if(fixed===4){ playSound(800); document.getElementById('game').style.opacity='1'; setTimeout(()=>window.parent.postMessage("joc_finalitzat","*"),1000); } }
    setInterval(()=>{ const m=Math.floor(tl/60),s=tl%60; const tEl=document.getElementById('t'); if(tEl) tEl.innerText=`${m}:${s.toString().padStart(2,'0')}`; if(tl--<=0) window.parent.postMessage("joc_finalitzat","*"); },1000);
    </script>
</body></html>
