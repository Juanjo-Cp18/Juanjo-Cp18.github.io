<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8"><style>
    :root { --nc:#22d3ee; --np:#a5b4fc; --db:#020617; }
    body { margin:0; background:var(--db); color:white; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; }
    #header { padding:10px 20px; background:rgba(30,41,59,0.8); display:flex; justify-content:space-between; border-bottom:2px solid var(--nc); box-sizing:border-box; }
    #main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #graella { display:grid; grid-template-columns:repeat(6, 50px); gap:10px; background:rgba(30,41,59,0.5); padding:20px; border-radius:15px; border:1px solid var(--np); }
    .e { width:50px; height:50px; background:#1e293b; display:flex; align-items:center; justify-content:center; font-size:25px; cursor:pointer; border-radius:8px; transition:0.2s; }
    button { background:var(--np); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold; }
    </style></head>
<body>
    <div id="header"><div>Premi #6: TROBA L'ESTRELLA ESPECIAL!</div><div style="display:flex;gap:15px;align-items:center;"><button onclick="location.reload()">REINICIAR</button><div id="t">02:00</div></div></div>
    <div id="main"><div id="graella"></div></div>
    <script>
    const audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    function playSound(f){ try{const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1);}catch(e){} }
    const g=document.getElementById('graella'), pos=Math.floor(Math.random()*36); let tl=120;
    function finalize(){ playSound(800); window.parent.postMessage("joc_finalitzat","*"); }
    for(let i=0;i<36;i++){
        const d=document.createElement('div'); d.className='e'; d.innerHTML='⭐';
        d.onclick=()=>{if(i===pos){playSound(600); d.innerHTML='✨'; d.style.background="var(--nc)"; setTimeout(finalize,800);}else{playSound(150); d.style.background="#ef4444"; d.style.opacity="0.3";}};
        g.appendChild(d);
    }
    setInterval(()=>{
        const m=Math.floor(tl/60), s=tl%60; const tEl=document.getElementById('t');
        if(tEl) tEl.innerText=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if(tl--<=0) finalize();
    }, 1000);
    </script>
</body></html>
