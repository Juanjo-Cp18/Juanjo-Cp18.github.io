<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premi #48: PUNTERIA PRECISA</title>
    <style>
        :root { --primary: #10b981; --bg: #020617; --surface: #1e293b; --accent: #f472b6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; user-select: none; }
        #header { position: absolute; top:0; left:0; width:100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items:center; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--primary); box-sizing: border-box; z-index: 100; }
        #game { position: relative; width: 100%; height: 100%; background: radial-gradient(circle, #064e3b 0%, #020617 100%); overflow: hidden; }
        #canvas { display: block; cursor: crosshair; }
        #instruction { position: absolute; bottom: 40px; width: 100%; text-align: center; color: var(--primary); font-size: 1.5rem; font-weight: bold; pointer-events: none; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; text-align:center; }
        .prize-box { background: var(--surface); padding: 30px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; }
        button.reset { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">#48: PUNTERIA PRECISA</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="timer" style="font-family: monospace; font-size: 1.2rem;">02:00</div>
            <button class="reset" onclick="location.reload()">Reiniciar</button>
        </div>
    </div>
    <div id="game">
        <canvas id="canvas"></canvas>
        <div id="instruction">CLICA SOBRE LES DIANES PER ELIMINAR-LES!</div>
    </div>
    <div id="overlay">
        <h2>PUNTERIA INFAL·LIBLE!</h2>
        <div class="prize-box">
            <p>PREMI Nº</p>
            <h1 style="font-size: 5rem; color: var(--accent); margin: 0;">48</h1>
        </div>
        <p>+10 PUNTS</p>
        <button class="reset" onclick="location.reload()">Juga de nou</button>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type="sine", dur=0.1) {
            try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur); o.start(); o.stop(audioCtx.currentTime+dur); } catch(e){}
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');

        let timeLeft = 120, gameActive = true, score = 0, goal = 20;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let targets = [];

        function spawnTarget() {
            targets.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * (canvas.height - 200) + 150,
                radius: 25,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
        }

        for(let i=0; i<5; i++) spawnTarget();

        canvas.onclick = (e) => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            let hit = false;
            targets.forEach((t, i) => {
                const dist = Math.sqrt((mouseX - t.x)**2 + (mouseY - t.y)**2);
                if(dist < t.radius) {
                    targets.splice(i, 1);
                    score++;
                    hit = true;
                    playSfx(600, "sine", 0.1);
                    spawnTarget();
                    if(score >= goal) win();
                }
            });
            if(!hit) playSfx(150, "square", 0.05);
        };

        function loop() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            targets.forEach(t => {
                t.x += t.vx;
                t.y += t.vy;

                if(t.x < t.radius || t.x > canvas.width - t.radius) t.vx *= -1;
                if(t.y < 150 || t.y > canvas.height - t.radius) t.vy *= -1;

                // Draw target
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
                ctx.fillStyle = t.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Inner circle
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.stroke();
                
                // Center dot
                ctx.beginPath();
                ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            });

            ctx.fillStyle = 'white';
            ctx.font = '20px sans-serif';
            ctx.fillText(`Punts: ${score} / ${goal}`, 30, 100);

            requestAnimationFrame(loop);
        }

        function win() {
            gameActive = false;
            playSfx(800, "sine", 0.5);
            overlay.style.display = 'flex';
            window.parent.postMessage("joc_finalitzat", "*");
        }

        const timer = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timer); win(); }
        }, 1000);

        loop();
    </script>
</body>
</html>
