<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8"><style>
    :root { --nc:#22d3ee; --np:#a5b4fc; --db:#020617; }
    body { margin:0; background:var(--db); color:white; font-family:sans-serif; }
    #header { padding:10px; display:flex; justify-content:space-between; border-bottom:2px solid var(--nc); }
    #game { display:flex; justify-content:center; gap:20px; margin-top:50px; }
    .star { font-size:40px; cursor:pointer; padding:10px; border:1px solid transparent; }
    .done { border-color:var(--nc); background:rgba(34,211,238,0.2); }
    button { background:var(--np); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold; }
    </style></head>
<body>
    <div id="header"><div>Premi #13: SEGUEIX EL PATRÓ!</div><div style="display:flex;gap:15px;align-items:center;"><button onclick="location.reload()">REINICIAR</button><div id="t">02:00</div></div></div>
    <div id="game"></div>
    <script>
    const audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    function playSound(f){ try{const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1);}catch(e){} }
    let tl=120, next=1;
    for(let i=1;i<=5;i++){
        const s=document.createElement('div'); s.className='star'; s.innerHTML='⭐'; s.innerText=i;
        s.onclick=()=>{ if(i===next){ playSound(400+i*50); s.classList.add('done'); next++; if(next>5){ playSound(800); window.parent.postMessage("joc_finalitzat","*"); } }else{ playSound(100); } };
        document.getElementById('game').appendChild(s);
    }
    setInterval(()=>{ const m=Math.floor(tl/60),s=tl%60; const tEl=document.getElementById('t'); if(tEl) tEl.innerText=`${m}:${s.toString().padStart(2,'0')}`; if(tl--<=0) window.parent.postMessage("joc_finalitzat","*"); },1000);
    </script>
</body></html>
