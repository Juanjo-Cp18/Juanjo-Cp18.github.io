<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premi #42: PIPES DE NEÓ</title>
    <style>
        :root { --primary: #22d3ee; --bg: #020617; --surface: #1e293b; --accent: #f472b6; --power: #fde047; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; user-select: none; }
        #header { position: absolute; top:0; left:0; width:100%; padding: 15px 25px; box-sizing: border-box; display: flex; justify-content: space-between; align-items:center; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--primary); z-index: 100; }
        #game { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #083344 0%, #020617 100%); }
        .grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .tile { width: 80px; height: 80px; background: var(--surface); border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.3s; border: 2px solid rgba(255,255,255,0.1); position: relative; }
        .tile svg { width: 80%; height: 80%; stroke: var(--primary); stroke-width: 10; fill: none; stroke-linecap: round; transition: stroke 0.3s, filter 0.3s; }
        .tile.powered svg { stroke: var(--power); filter: drop-shadow(0 0 12px var(--power)); }
        .tile.source { border-color: var(--power); background: rgba(253, 224, 71, 0.1); }
        .tile.source::after { content: '⚡'; position: absolute; font-size: 1rem; top: 2px; left: 2px; }
        .tile.goal { border-color: var(--accent); }
        .tile.goal::after { content: '🎯'; position: absolute; font-size: 1rem; top: 2px; right: 2px; }
        
        #instruction { margin-bottom: 20px; font-size: 1.3rem; color: var(--primary); font-weight: bold; text-align: center; max-width: 80%; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; text-align:center; }
        .prize-box { background: var(--surface); padding: 30px; border-radius: 15px; border: 2px solid var(--power); margin-bottom: 20px; }
        button.reset { background: var(--primary); color: var(--bg); border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        button.reset:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="header">
        <div class="title" style="font-weight: bold;">#42: PIPES DE NEÓ</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="timer" style="font-family: monospace; font-size: 1.2rem;">02:00</div>
            <button class="reset" onclick="location.reload()">Reiniciar</button>
        </div>
    </div>
    <div id="game">
        <div id="instruction">CONNECTA LA FONT D'ENERGIA (⚡) AMB L'OBJECTIU (🎯)!</div>
        <div class="grid" id="grid"></div>
        <div id="level" style="margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: var(--accent);">Nivell: 1 / 3</div>
    </div>
    <div id="overlay">
        <h2 style="color: var(--power)">CIRCUIT COMPLETAT!</h2>
        <div class="prize-box">
            <p>PREMI Nº</p>
            <h1 style="font-size: 5rem; color: var(--primary); margin: 0;">42</h1>
        </div>
        <p>+10 PUNTS</p>
        <button class="reset" onclick="location.reload()">Juga de nou</button>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type="sine", dur=0.1) {
            try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur); o.start(); o.stop(audioCtx.currentTime+dur); } catch(e){}
        }

        let level = 1, timeLeft = 120, gameActive = true;
        const gridEl = document.getElementById('grid');
        const overlay = document.getElementById('overlay');
        const levelEl = document.getElementById('level');

        // connections: [N, E, S, W]
        const types = [
            { id: 'straight', svg: '<line x1="0" y1="50" x2="100" y2="50"/>', connections: [false, true, false, true] },
            { id: 'corner', svg: '<path d="M 50 100 Q 50 50 100 50"/>', connections: [false, true, true, false] }
        ];

        let board = [];
        const SIZE = 4;

        function generateLevel() {
            board = [];
            gridEl.innerHTML = '';
            levelEl.innerText = `Nivell: ${level} / 3`;

            for(let i=0; i<SIZE*SIZE; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const rotation = Math.floor(Math.random() * 4);
                
                const tile = document.createElement('div');
                tile.className = 'tile';
                if(i === 0) tile.classList.add('source');
                if(i === SIZE*SIZE - 1) tile.classList.add('goal');
                
                tile.innerHTML = `<svg viewBox="0 0 100 100">${type.svg}</svg>`;
                tile.style.transform = `rotate(${rotation * 90}deg)`;
                
                board.push({ type, rotation, el: tile });
                tile.onclick = () => rotate(i);
                gridEl.appendChild(tile);
            }
            updatePower();
        }

        function rotate(idx) {
            if(!gameActive) return;
            board[idx].rotation = (board[idx].rotation + 1) % 4;
            board[idx].el.style.transform = `rotate(${board[idx].rotation * 90}deg)`;
            playSfx(400 + (idx % 4) * 50, "sine", 0.05);
            updatePower();
        }

        function getConnections(idx) {
            const b = board[idx];
            const conn = [...b.type.connections];
            // Rotate connections array based on rotation
            for(let i=0; i<b.rotation; i++) {
                conn.unshift(conn.pop());
            }
            return conn;
        }

        function updatePower() {
            board.forEach(b => b.el.classList.remove('powered'));
            
            const powered = new Set();
            const queue = [0]; // Start from first tile
            powered.add(0);

            while(queue.length > 0) {
                const currIdx = queue.shift();
                const currConns = getConnections(currIdx);
                const r = Math.floor(currIdx / SIZE);
                const c = currIdx % SIZE;

                // Neighbors: [N, E, S, W]
                const neighbors = [
                    { idx: currIdx - SIZE, dir: 0, opp: 2, cond: r > 0 },
                    { idx: currIdx + 1,    dir: 1, opp: 3, cond: c < SIZE - 1 },
                    { idx: currIdx + SIZE, dir: 2, opp: 0, cond: r < SIZE - 1 },
                    { idx: currIdx - 1,    dir: 3, opp: 1, cond: c > 0 }
                ];

                neighbors.forEach(n => {
                    if(n.cond && !powered.has(n.idx)) {
                        const neighConns = getConnections(n.idx);
                        if(currConns[n.dir] && neighConns[n.opp]) {
                            powered.add(n.idx);
                            queue.push(n.idx);
                        }
                    }
                });
            }

            powered.forEach(idx => board[idx].el.classList.add('powered'));

            if(powered.has(SIZE * SIZE - 1)) {
                playSfx(600, "sine", 0.2);
                level++;
                if(level > 3) win();
                else {
                    gameActive = false;
                    setTimeout(() => { gameActive = true; generateLevel(); }, 800);
                }
            }
        }

        function win() {
            gameActive = false;
            playSfx(800, "sine", 0.5);
            overlay.style.display = 'flex';
            window.parent.postMessage("joc_finalitzat", "*");
        }

        const timer = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timer); win(); }
        }, 1000);

        generateLevel();
    </script>
</body>
</html>
