<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premi #38: CERCA L'ELEMENT</title>
    <style>
        :root { --primary: #10b981; --bg: #020617; --surface: #1e293b; --accent: #f472b6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; user-select: none; }
        #header { position: absolute; top:0; left:0; width:100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items:center; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--primary); box-sizing: border-box; z-index: 100; }
        #game { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #064e3b 0%, #020617 100%); padding-top: 80px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; padding: 20px; max-width: 90vw; }
        .item { font-size: 2.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.1s; border-radius: 8px; padding: 5px; }
        .item:hover { background: rgba(255,255,255,0.05); transform: scale(1.1); }
        #instruction { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        #stats { font-size: 1.2rem; margin-bottom: 20px; color: var(--accent); }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; text-align:center; }
        .prize-box { background: var(--surface); padding: 30px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">#38: CERCA L'ELEMENT</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="timer" style="font-family: monospace; font-size: 1.2rem;">02:00</div>
            <button onclick="location.reload()">Reiniciar</button>
        </div>
    </div>
    <div id="game">
        <div id="instruction">TROBA L'ELEMENT DIFERENT!</div>
        <div id="stats">Encerts: 0 / 5</div>
        <div class="grid" id="grid"></div>
    </div>
    <div id="overlay">
        <h2>VISTA D'ÀGUILA!</h2>
        <div class="prize-box">
            <p>PREMI Nº</p>
            <h1 style="font-size: 5rem; color: var(--accent); margin: 0;">38</h1>
        </div>
        <p>+10 PUNTS</p>
        <button onclick="location.reload()">Juga de nou</button>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type="sine", dur=0.1) {
            try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur); o.start(); o.stop(audioCtx.currentTime+dur); } catch(e){}
        }

        const pairs = [
            ['🍎', '🍏'], ['🐶', '🐱'], ['⭐', '🌟'], ['🌚', '🌞'], ['🎈', '🏮'],
            ['⚽', '🏀'], ['🚗', '🚙'], ['🍦', '🍧'], ['🍪', '🍩'], ['🔥', '💥']
        ];
        let score = 0, timeLeft = 120, gameActive = true;
        const grid = document.getElementById('grid');
        const stats = document.getElementById('stats');
        const overlay = document.getElementById('overlay');

        function generateGrid() {
            grid.innerHTML = '';
            const pair = pairs[Math.floor(Math.random() * pairs.length)];
            const distractor = pair[0];
            const target = pair[1];
            
            const total = 50; 
            const targetPos = Math.floor(Math.random() * total);
            
            for(let i=0; i<total; i++) {
                const item = document.createElement('div');
                item.className = 'item';
                item.innerText = (i === targetPos) ? target : distractor;
                item.onclick = () => {
                    if(!gameActive) return;
                    if(i === targetPos) {
                        score++;
                        playSfx(600, "sine", 0.1);
                        stats.innerText = `Encerts: ${score} / 5`;
                        if(score >= 5) win();
                        else generateGrid();
                    } else {
                        playSfx(150, "sawtooth", 0.1);
                    }
                };
                grid.appendChild(item);
            }
        }

        function win() {
            gameActive = false;
            playSfx(800, "sine", 0.5);
            overlay.style.display = 'flex';
            window.parent.postMessage("joc_finalitzat", "*");
        }

        const timer = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timer); win(); }
        }, 1000);

        generateGrid();
    </script>
</body>
</html>
