<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premi #46: GANXO DE RESCAT</title>
    <style>
        :root { --primary: #fbbf24; --bg: #020617; --surface: #1e293b; --accent: #f472b6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; user-select: none; }
        #header { position: absolute; top:0; left:0; width:100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items:center; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--primary); box-sizing: border-box; z-index: 100; }
        #game { position: relative; width: 100%; height: 100%; background: radial-gradient(circle, #451a03 0%, #020617 100%); overflow: hidden; }
        #canvas { display: block; }
        #instruction { position: absolute; bottom: 40px; width: 100%; text-align: center; color: var(--primary); font-size: 1.5rem; font-weight: bold; pointer-events: none; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; text-align:center; }
        .prize-box { background: var(--surface); padding: 30px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; }
        button.reset { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">#46: GANXO DE RESCAT</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="timer" style="font-family: monospace; font-size: 1.2rem;">02:00</div>
            <button class="reset" onclick="location.reload()">Reiniciar</button>
        </div>
    </div>
    <div id="game">
        <canvas id="canvas"></canvas>
        <div id="instruction">CLICA PER LLANÇAR EL GANXO!</div>
    </div>
    <div id="overlay">
        <h2>RESCAT COMPLET!</h2>
        <div class="prize-box">
            <p>PREMI Nº</p>
            <h1 style="font-size: 5rem; color: var(--accent); margin: 0;">46</h1>
        </div>
        <p>+10 PUNTS</p>
        <button class="reset" onclick="location.reload()">Juga de nou</button>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type="sine", dur=0.1) {
            try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur); o.start(); o.stop(audioCtx.currentTime+dur); } catch(e){}
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');

        let timeLeft = 120, gameActive = true, score = 0, goal = 5;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let angle = 0, angleVel = 0.05, hookState = 'swinging'; // swinging, extending, retracting
        let hookLen = 50, hookMaxLen = canvas.height - 100;
        let items = [];

        function spawnItem() {
            items.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: canvas.height - 100 - Math.random() * 200,
                radius: 15,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
        }

        for(let i=0; i<8; i++) spawnItem();

        canvas.onclick = () => {
            if(hookState === 'swinging' && gameActive) {
                hookState = 'extending';
                playSfx(300, "sawtooth", 0.1);
            }
        };

        function loop() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Swing logic
            if(hookState === 'swinging') {
                angle += angleVel;
                if(Math.abs(angle) > Math.PI / 3) angleVel *= -1;
            } else if(hookState === 'extending') {
                hookLen += 10;
                if(hookLen > hookMaxLen) hookState = 'retracting';
                
                // Collision check
                const hx = canvas.width/2 + Math.sin(angle) * hookLen;
                const hy = 60 + Math.cos(angle) * hookLen;
                items.forEach((item, idx) => {
                    const dist = Math.sqrt((hx - item.x)**2 + (hy - item.y)**2);
                    if(dist < item.radius + 10) {
                        item.attached = true;
                        hookState = 'retracting';
                        playSfx(600, "sine", 0.1);
                    }
                });
            } else if(hookState === 'retracting') {
                hookLen -= 8;
                if(hookLen <= 50) {
                    hookLen = 50;
                    hookState = 'swinging';
                    const attached = items.find(i => i.attached);
                    if(attached) {
                        score++;
                        items = items.filter(i => !i.attached);
                        spawnItem();
                        playSfx(800, "sine", 0.2);
                        if(score >= goal) win();
                    }
                }
            }

            // Draw line
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 60);
            const hx = canvas.width/2 + Math.sin(angle) * hookLen;
            const hy = 60 + Math.cos(angle) * hookLen;
            ctx.lineTo(hx, hy);
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Draw hook head
            ctx.beginPath();
            ctx.arc(hx, hy, 10, 0, Math.PI * 2);
            ctx.fillStyle = varColor('--primary');
            ctx.fill();

            // Draw items
            items.forEach(item => {
                if(item.attached) {
                    item.x = hx;
                    item.y = hy + 15;
                }
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            ctx.fillStyle = 'white';
            ctx.font = '20px sans-serif';
            ctx.fillText(`Punts: ${score} / ${goal}`, 30, 100);

            requestAnimationFrame(loop);
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

        function win() {
            gameActive = false;
            playSfx(1000, "sine", 0.5);
            overlay.style.display = 'flex';
            window.parent.postMessage("joc_finalitzat", "*");
        }

        const timer = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timer); win(); }
        }, 1000);

        loop();
    </script>
</body>
</html>
