<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Croquis Catastral</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <h1>Generador de Croquis</h1>
  </header>

  <div class="container">

    <aside class="panel">
      <label>Escala:</label>
      <select id="scale">
        <option value="100">1:100</option>
        <option value="200" selected>1:200</option>
        <option value="250">1:250</option>
        <option value="500">1:500</option>
        <option value="1000">1:1000</option>
      </select>

      <label>Tipo de mapa:</label>
      <select id="mapType">
        <option value="basic">Básico técnico</option>
        <option value="parcelario">Parcelario</option>
        <option value="eje">Solo eje</option>
      </select>

      <button id="generateBtn">Generar SVG</button>
    </aside>

    <main id="map"></main>

  </div>

  <div class="version">Versión 1.0</div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/map.js"></script>

</body>
</html>
