<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SmartScan Pro - v1.3 Precisión</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; display: flex; flex-direction: column; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        .scan-line { 
            position: absolute; width: 100%; height: 3px; background: #10b981; 
            box-shadow: 0 0 20px #10b981; z-index: 50; top: 0; display: none;
        }
        .is-scanning .scan-line { display: block; animation: scanMove 2s infinite ease-in-out; }
        @keyframes scanMove { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        input, select { background: transparent; border: none; color: inherit; outline: none; transition: all 0.2s; width: 100%; }
        input:focus { color: #10b981; font-weight: bold; border-bottom: 1px solid #10b981; }
        
        .row-new { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        footer { padding: 20px; text-align: center; font-size: 11px; color: #475569; letter-spacing: 3px; font-weight: 900; }
    </style>
</head>
<body class="flex flex-col">

    <audio id="shutter-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header class="p-6 flex justify-between items-center sticky top-0 z-40 bg-[#020617]/90 backdrop-blur-md">
        <div>
            <h1 class="text-xl font-black italic text-emerald-500 tracking-tighter">SMART SCAN <span class="text-white">PRO</span></h1>
            <div class="h-1 w-full bg-emerald-500/20 rounded-full mt-1 overflow-hidden">
                <div id="progress-bar" class="h-full bg-emerald-500 w-0 transition-all duration-300"></div>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="btn-pdf" class="hidden glass px-3 py-1.5 rounded-full text-[10px] font-black text-red-400 border-red-500/30 uppercase active:scale-95">PDF</button>
            <button id="btn-csv" class="hidden glass px-3 py-1.5 rounded-full text-[10px] font-black text-emerald-400 border-emerald-500/30 uppercase active:scale-95">CSV</button>
        </div>
    </header>

    <main class="px-4 space-y-6 flex-1">
        <div id="camera-box" class="relative aspect-[4/5] rounded-[2rem] overflow-hidden border-2 border-emerald-500/10 bg-black shadow-inner">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <div class="scan-line"></div>
            
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-30">
                <div class="w-10/12 h-32 border-2 border-emerald-500/60 rounded-xl bg-emerald-500/5 relative">
                    <div class="absolute -top-5 left-2 text-[9px] font-black text-emerald-400 uppercase tracking-widest bg-black/60 px-2 py-0.5 rounded">Centrar línea aquí</div>
                    <div class="absolute -left-1 -top-1 w-4 h-4 border-t-2 border-l-2 border-emerald-500"></div>
                    <div class="absolute -right-1 -top-1 w-4 h-4 border-t-2 border-r-2 border-emerald-500"></div>
                    <div class="absolute -left-1 -bottom-1 w-4 h-4 border-b-2 border-l-2 border-emerald-500"></div>
                    <div class="absolute -right-1 -bottom-1 w-4 h-4 border-b-2 border-r-2 border-emerald-500"></div>
                </div>
            </div>

            <div id="loader" class="absolute inset-0 bg-slate-950/90 hidden flex-col items-center justify-center z-[60]">
                <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
                <p id="status-text" class="mt-4 text-[10px] font-black tracking-[0.2em] text-emerald-500 uppercase">Analizando...</p>
            </div>
        </div>

        <div class="flex justify-center gap-6 -mt-16 relative z-30">
            <button id="capture-btn" class="w-20 h-20 rounded-full bg-emerald-500 text-slate-950 shadow-[0_0_30px_rgba(16,185,129,0.3)] flex items-center justify-center active:scale-90 transition-all border-4 border-slate-900">
                <i class="fas fa-camera text-2xl"></i>
            </button>
            <button onclick="addRowManual()" class="w-14 h-14 rounded-full glass text-emerald-500 shadow-xl flex items-center justify-center mt-3 active:scale-90 transition-all border border-emerald-500/20">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <section id="summary" class="grid grid-cols-2 gap-4 opacity-0 transition-all duration-500">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
                <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Total TV</span>
                <p id="total-tv" class="text-2xl font-black text-white">0,00 €</p>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-orange-500">
                <span class="text-[9px] font-black text-orange-400 uppercase tracking-widest">Total E</span>
                <p id="total-e" class="text-2xl font-black text-white">0,00 €</p>
            </div>
        </section>

        <div class="glass rounded-[2rem] overflow-hidden shadow-2xl mb-6">
            <table class="w-full text-[11px] text-left">
                <thead class="bg-emerald-500/5 text-slate-500 text-[8px] font-black uppercase tracking-[0.2em]">
                    <tr>
                        <th class="p-4">Concepto</th>
                        <th class="p-4 text-center">Tipo</th>
                        <th class="p-4 text-right">Valor</th>
                        <th class="p-4 w-8"></th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr id="placeholder"><td colspan="4" class="p-10 text-center text-slate-600 italic font-medium">Sitúa la línea a leer en el recuadro superior</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p class="uppercase tracking-[0.4em] text-emerald-500/40">Versión 1.3</p>
    </footer>

    <canvas id="procCanvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('video');
        const procCanvas = document.getElementById('procCanvas');
        const captureBtn = document.getElementById('capture-btn');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById
