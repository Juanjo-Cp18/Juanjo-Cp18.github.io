<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SmartScan Pro - v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@2.1.4/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .zoom-slider { -webkit-appearance: none; width: 100%; height: 8px; background: #1e293b; border-radius: 10px; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #10b981; border-radius: 50%; border: 3px solid #ffffff; }
        input, select { background: transparent; border: none; color: inherit; outline: none; width: 100%; }
        .row-item:nth-child(even) { background: rgba(255,255,255,0.02); }
        footer { padding: 20px; text-align: center; font-size: 10px; color: #475569; font-weight: 900; letter-spacing: 5px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-5 sticky top-0 z-50 bg-[#020617]/95 border-b border-emerald-500/20 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-emerald-500 italic tracking-tighter">SMARTSCAN <span class="text-white not-italic text-sm">2.0</span></h1>
            <p id="status" class="text-[8px] text-emerald-500/50 font-bold uppercase">Sistema de Precisión Activo</p>
        </div>
        <div class="flex gap-2">
            <button onclick="cleanEmpty()" class="glass px-3 py-2 rounded-xl text-orange-400 border-orange-500/20" title="Limpiar filas vacías"><i class="fas fa-broom"></i></button>
            <button onclick="clearAll()" class="glass px-3 py-2 rounded-xl text-red-400 border-red-500/20"><i class="fas fa-trash"></i></button>
            <button id="btn-csv" class="hidden glass px-3 py-2 rounded-xl text-[10px] font-black text-emerald-400">EXCEL</button>
        </div>
    </header>

    <main class="p-4 space-y-4 flex-1">
        <div class="relative rounded-[2.5rem] overflow-hidden border-2 border-emerald-500/30 bg-black aspect-[4/5] shadow-2xl">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <div id="loader" class="absolute inset-0 bg-black/95 hidden flex flex-col items-center justify-center z-50">
                <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-emerald-400 text-xs font-black tracking-widest animate-pulse">FILTRANDO RUIDO...</p>
            </div>
        </div>

        <div class="glass p-4 rounded-3xl space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black text-gray-500 uppercase">Ajuste de Enfoque (Zoom)</span>
                <span id="zoom-val" class="text-emerald-500 font-bold text-sm">1x</span>
            </div>
            <input type="range" id="zoom" class="zoom-slider" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="flex justify-center gap-6 py-2">
            <button id="capture-btn" class="w-24 h-24 rounded-full bg-emerald-500 text-slate-950 shadow-[0_0_40px_rgba(16,185,129,0.3)] flex items-center justify-center active:scale-90 transition-all">
                <i class="fas fa-expand text-3xl"></i>
            </button>
            <button onclick="addRow()" class="w-16 h-16 rounded-full glass text-white flex items-center justify-center mt-4 active:scale-90">
                <i class="fas fa-keyboard text-xl"></i>
            </button>
        </div>

        <div class="glass rounded-[2rem] overflow-hidden mb-10 border border-white/5">
            <table class="w-full text-xs text-left">
                <thead class="bg-emerald-500/10 text-emerald-500 text-[9px] uppercase font-black">
                    <tr>
                        <th class="p-4">Concepto Detallado</th>
                        <th class="p-4 text-center">Tipo</th>
                        <th class="p-4 text-right">Importe</th>
                        <th class="p-4 w-8"></th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </main>

    <footer>VERSIÓN 2.0</footer>
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const loader = document.getElementById('loader');
        const zoomInput = document.getElementById('zoom');
        let rows = JSON.parse(localStorage.getItem('smart_v20')) || [];
        let track;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920 } });
                video.srcObject = stream;
                track = stream.getVideoTracks()[0];
                render();
            } catch (e) { alert("Error de cámara"); }
        }

        zoomInput.oninput = () => {
            const val = zoomInput.value;
            document.getElementById('zoom-val').innerText = val + "x";
            if (track && track.getCapabilities().zoom) track.applyConstraints({ advanced: [{ zoom: val }] });
        };

        async function process() {
            loader.classList.remove('hidden');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // FILTRO DE ALTA DEFINICIÓN
            ctx.filter = "contrast(1.6) grayscale(1) brightness(1.1) sharp(1)";
            ctx.drawImage(video, 0, 0);

            try {
                const result = await Tesseract.recognize(canvas.toDataURL('image/jpeg', 0.9), 'spa');
                const lines = result.data.text.split('\n');
                
                lines.forEach(line => {
                    let clean = line.trim();
                    
                    // 1. ELIMINAR ENCABEZADOS Y FILAS BASURA
                    if (/concepto|importe|total|fecha|hoja|página|lista|nombre/i.test(clean) || clean.length < 2) return;

                    // 2. BUSCAR PRECIO (Solo si hay un número de al menos 1 decimal o entero)
                    const matches = clean.match(/(\d+[\.,]\d{1,2})|(\d+)/g);
                    if (!matches) return; // SI NO HAY NÚMERO, IGNORAMOS LA FILA

                    const valStr = matches[matches.length - 1];
                    const val = parseFloat(valStr.replace(',', '.'));
                    
                    // 3. LIMPIAR CONCEPTO (Quitamos el precio encontrado y caracteres raros)
                    let concept = clean.replace(valStr, '').replace(/\b(TV|E)\b/gi, '').replace(/[^\w\sáéíóúÁÉÍÓÚ]/g, '').trim();
                    
                    // 4. DETERMINAR TIPO
                    const type = /\bE\b| E$/i.test(clean) ? 'E' : 'TV';

                    if (val > 0 || concept.length > 3) {
                        rows.push({ concepto: concept || "Gasto...", tipo: type, valor: val });
                    }
                });
                save(); render();
            } catch (err) { alert("Error de lectura"); }
            finally { loader.classList.add('hidden'); }
        }

        function addRow() { rows.push({ concepto: "", tipo: "TV", valor: 0 }); save(); render(); }
        
        function cleanEmpty() {
            rows = rows.filter(r => r.valor > 0 || r.concepto !== "");
            save(); render();
        }

        function clearAll() { if(confirm("¿Vaciar toda la lista?")) { rows = []; save(); render(); } }

        function save() { localStorage.setItem('smart_v20', JSON.stringify(rows)); }

        function render() {
            const tbody = document.getElementById('tbody');
            const hasData = rows.length > 0;
            document.getElementById('btn-csv').classList.toggle('hidden', !hasData);
            
            tbody.innerHTML = '';
            let sTV = 0, sE = 0;
            rows.forEach((r, i) => {
                if(r.tipo === 'TV') sTV += r.valor; else sE += r.valor;
                const tr = document.createElement('tr');
                tr.className = "row-item";
                tr.innerHTML = `
                    <td class="p-4"><input type="text" value="${r.concepto}" onchange="upd(${i},'concepto',this.value)" placeholder="Escribir..."></td>
                    <td class="p-4 text-center">
                        <select onchange="upd(${i},'tipo',this.value)" class="font-bold text-[10px] ${r.tipo==='TV'?'text-blue-400':'text-orange-400'}">
                            <option value="TV" ${r.tipo==='TV'?'selected':''}>TV</option>
                            <option value="E" ${r.tipo==='E'?'selected':''}>E</option>
                        </select>
                    </td>
                    <td class="p-4 text-right"><input type="number" step="0.01" value="${r.valor}" onchange="upd(${i},'valor',this.value)" class="text-right font-black w-20"></td>
                    <td class="p-2 text-center text-red-500/20" onclick="del(${i})"><i class="fas fa-times-circle"></i></td>
                `;
                tbody.appendChild(tr);
            });
            // Resumen dinámico en el botón de estado
            document.getElementById('status').innerText = `TOTAL: TV ${(sTV).toFixed(2)}€ | E ${(sE).toFixed(2)}€`;
        }

        function upd(i,f,v) { rows[i][f] = f==='valor'?parseFloat(v)||0:v; save(); render(); }
        function del(i) { rows.splice(i,1); save(); render(); }

        document.getElementById('btn-csv').onclick = () => {
            let csv = "\uFEFFConcepto;Tipo;Importe\n";
            rows.forEach(r => csv += `${r.concepto};${r.tipo};${r.valor.toFixed(2).replace('.',',')}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'SmartScan_v2.csv'; a.click();
        };

        captureBtn.onclick = process;
        window.onload = init;
    </script>
</body>
</html>
