<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SmartScan Pro - OCR REAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .scanning-line { 
            position: absolute; width: 100%; height: 4px; background: #10b981; 
            box-shadow: 0 0 15px #10b981; z-index: 20; top: 0; display: none;
        }
        .is-scanning .scanning-line { display: block; animation: scan 2s infinite linear; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        #video-canvas { display: none; } /* Canvas oculto para procesar foto */
        .loading-spinner { display: none; }
        .is-processing .loading-spinner { display: flex; }
    </style>
</head>
<body class="pb-20">

    <audio id="shutter-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header class="p-6 pt-10 sticky top-0 z-30 bg-[#0a0a0a]/90 backdrop-blur-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase">Smart<span class="text-emerald-500 italic">Scanner</span></h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">Modo Lectura Real de Columnas</p>
        </div>
        <div class="flex gap-2">
            <button id="btn-pdf" class="hidden glass p-2 px-4 rounded-full text-red-400 text-[10px] font-bold border-red-500/20">PDF</button>
            <button id="btn-csv" class="hidden glass p-2 px-4 rounded-full text-emerald-400 text-[10px] font-bold border-emerald-500/20">CSV</button>
        </div>
    </header>

    <main class="px-4 space-y-6">
        <div id="camera-container" class="relative aspect-[3/4] rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl bg-black">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <div class="scanning-line"></div>
            
            <div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-3">
                <button onclick="changeZoom(0.2)" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-plus"></i></button>
                <button onclick="changeZoom(-0.2)" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-minus"></i></button>
            </div>

            <div class="loading-spinner absolute inset-0 bg-black/60 flex-col items-center justify-center z-50">
                <div class="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                <p class="text-[10px] font-bold text-emerald-500">PROCESANDO ESCRITURA...</p>
            </div>
        </div>

        <div class="flex justify-center -mt-14 relative z-20">
            <button id="capture-btn" class="w-20 h-20 rounded-full glass border-4 border-white/10 p-1 active:scale-90 transition-transform shadow-2xl">
                <div class="w-full h-full bg-white rounded-full flex items-center justify-center">
                    <i class="fas fa-expand text-black text-xl"></i>
                </div>
            </button>
        </div>

        <section id="summary" class="hidden grid grid-cols-2 gap-3">
            <div class="glass p-4 rounded-2xl border-l-4 border-blue-500">
                <span class="text-[9px] font-bold text-blue-400 block mb-1">TOTAL TV</span>
                <span id="total-tv" class="text-xl font-black">0,00 €</span>
            </div>
            <div class="glass p-4 rounded-2xl border-l-4 border-orange-500">
                <span class="text-[9px] font-bold text-orange-400 block mb-1">TOTAL E</span>
                <span id="total-e" class="text-xl font-black">0,00 €</span>
            </div>
        </section>

        <div class="glass rounded-[1.5rem] overflow-hidden">
            <table class="w-full text-[11px] text-left">
                <thead class="bg-white/5 text-gray-500 uppercase text-[8px] tracking-widest">
                    <tr>
                        <th class="p-4">Concepto Completo</th>
                        <th class="p-4 text-center">Tipo</th>
                        <th class="p-4 text-right">Cuantía</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="3" class="p-10 text-center text-gray-600 italic">Sin datos capturados</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <canvas id="video-canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('video-canvas');
        const tableBody = document.getElementById('table-body');
        const captureBtn = document.getElementById('capture-btn');
        const container = document.getElementById('camera-container');

        let dataRows = [];
        let zoom = 1;

        function changeZoom(v) {
            zoom = Math.max(1, Math.min(3, zoom + v));
            video.style.transform = `scale(${zoom})`;
        }

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280 } 
            });
            video.srcObject = stream;
        }

        async function performOCR() {
            container.classList.add('is-scanning', 'is-processing');
            document.getElementById('shutter-sound').play();

            // Dibujar frame actual en el canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            // Iniciar Tesseract
            const { data: { text } } = await Tesseract.recognize(canvas, 'spa', {
                logger: m => console.log(m)
            });

            processText(text);
        }

        function processText(rawText) {
            const lines = rawText.split('\n');
            
            lines.forEach(line => {
                if (line.trim().length < 3) return;

                // Buscamos "TV" o "E" (con espacios alrededor o al final)
                // Formato esperado: [Nombre/Anotacion] [TV|E] [Numero]
                const regex = /(.*?)\s+(TV|E)\s+(\d+[,.]?\d*)/i;
                const match = line.match(regex);

                if (match) {
                    dataRows.push({
                        concepto: match[1].trim(), // Captura TODO lo que hay antes de TV/E
                        tipo: match[2].toUpperCase(),
                        valor: parseFloat(match[3].replace(',', '.'))
                    });
                }
            });

            renderTable();
            container.classList.remove('is-scanning', 'is-processing');
        }

        function renderTable() {
            if (dataRows.length === 0) return;
            
            document.getElementById('summary').classList.remove('hidden');
            document.getElementById('btn-pdf').classList.remove('hidden');
            document.getElementById('btn-csv').classList.remove('hidden');

            tableBody.innerHTML = '';
            let sTV = 0, sE = 0;

            dataRows.forEach((row, i) => {
                if (row.tipo === 'TV') sTV += row.valor;
                else sE += row.valor;

                tableBody.innerHTML += `
                    <tr class="border-t border-white/5">
                        <td class="p-4 font-medium">${row.concepto}</td>
                        <td class="p-4 text-center"><span class="px-2 py-1 rounded bg-white/5 text-[9px]">${row.tipo}</span></td>
                        <td class="p-4 text-right font-mono">${row.valor.toFixed(2).replace('.',',')}€</td>
                    </tr>
                `;
            });

            document.getElementById('total-tv').innerText = sTV.toFixed(2).replace('.',',') + ' €';
            document.getElementById('total-e').innerText = sE.toFixed(2).replace('.',',') + ' €';
        }

        // EXPORTAR PDF
        document.getElementById('btn-pdf').addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("REGISTRO DE NOTAS - SMARTSCAN", 14, 15);
            
            const body = dataRows.map(r => [r.concepto, r.tipo, r.valor.toFixed(2) + '€']);
            doc.autoTable({
                head: [['Concepto', 'Tipo', 'Cuantía']],
                body: body,
                startY: 25
            });
            doc.save("notas.pdf");
        });

        // EXPORTAR CSV
        document.getElementById('btn-csv').addEventListener('click', () => {
            let csv = "Concepto;Tipo;Cuantia\n";
            dataRows.forEach(r => csv += `${r.concepto};${r.tipo};${r.valor.toFixed(2).replace('.',',')}€\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "notas.csv";
            link.click();
        });

        function clearResults() {
            dataRows = [];
            renderTable();
            tableBody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-gray-600 italic">Sin datos</td></tr>';
        }

        captureBtn.addEventListener('click', performOCR);
        window.onload = init;
    </script>
</body>
</html>
