<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SmartScan Pro - v1.7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.1/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input { background: transparent; border: none; color: inherit; width: 100%; outline: none; }
        .btn-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        footer { padding: 25px; text-align: center; font-size: 10px; color: #475569; letter-spacing: 4px; font-weight: 900; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 sticky top-0 z-40 bg-black/80 backdrop-blur-lg flex justify-between items-center border-b border-white/5">
        <div>
            <h1 class="text-xl font-black text-emerald-500 italic">SMARTSCAN <span class="text-white not-italic">1.7</span></h1>
            <p id="debug" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Estado: Listo</p>
        </div>
        <div class="flex gap-2">
            <button id="btn-pdf" class="hidden glass px-3 py-1.5 rounded-lg text-[9px] font-black text-red-400">PDF</button>
        </div>
    </header>

    <main class="p-4 space-y-6 flex-1">
        <div id="camera-box" class="relative aspect-square rounded-[2.5rem] overflow-hidden border-2 border-emerald-500/20 bg-black">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
            
            <div id="loader" class="absolute inset-0 bg-black/90 hidden flex flex-col items-center justify-center z-[60]">
                <div class="w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="status-text" class="text-[10px] font-black text-emerald-500 uppercase">Leyendo...</p>
            </div>
        </div>

        <div class="flex justify-center gap-6 -mt-14 relative z-30">
            <button id="capture-btn" class="w-20 h-20 rounded-full bg-emerald-500 text-black btn-glow flex items-center justify-center active:scale-95 transition-all">
                <i class="fas fa-camera text-2xl"></i>
            </button>
            <button onclick="addRow()" class="w-14 h-14 rounded-full glass text-white flex items-center justify-center mt-3 active:scale-90">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <section id="summary" class="grid grid-cols-2 gap-3 opacity-0">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
                <span class="text-[8px] font-black text-blue-400 uppercase">Total TV</span>
                <p id="total-tv" class="text-xl font-black">0,00 €</p>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-orange-500">
                <span class="text-[8px] font-black text-orange-400 uppercase">Total E</span>
                <p id="total-e" class="text-xl font-black">0,00 €</p>
            </div>
        </section>

        <div class="glass rounded-[2rem] overflow-hidden shadow-2xl mb-8">
            <table class="w-full text-xs text-left">
                <thead class="bg-white/5 text-gray-500 text-[8px] uppercase font-black">
                    <tr>
                        <th class="p-4">Concepto</th>
                        <th class="p-4 text-center">Tipo</th>
                        <th class="p-4 text-right">Valor</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr id="hint"><td colspan="3" class="p-10 text-center text-gray-600 italic">Pulsa el botón verde para escanear</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>VERSIÓN 1.7</footer>

    <canvas id="hidden-canvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('hidden-canvas');
        const debug = document.getElementById('debug');
        const loader = document.getElementById('loader');
        let rows = JSON.parse(localStorage.getItem('smart_v17')) || [];

        // Iniciar cámara de forma sencilla
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                render();
            } catch (err) {
                debug.innerText = "Error: Sin acceso a cámara";
            }
        }

        async function processImage() {
            loader.classList.remove('hidden');
            debug.innerText = "Estado: Escaneando...";
            
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Filtro mínimo para no romper el motor
            ctx.filter = "contrast(1.1)";
            ctx.drawImage(video, 0, 0);

            // Capturamos la imagen como Base64 para que Tesseract no tenga que leer el video
            const imageData = canvas.toDataURL('image/jpeg');

            try {
                // Modo ultra-compatible (Single Run)
                const result = await Tesseract.recognize(imageData, 'spa');
                
                if (result && result.data && result.data.text) {
                    parse(result.data.text);
                } else {
                    alert("No se detectó texto. Intenta acercar más el móvil.");
                }
            } catch (e) {
                console.error(e);
                alert("Error técnico de lectura. Se añadirá una fila manual.");
                addRow();
            } finally {
                loader.classList.add('hidden');
                debug.innerText = "Estado: Listo";
            }
        }

        function parse(text) {
            const lines = text.split('\n');
            let count = 0;
            lines.forEach(l => {
                const clean = l.trim();
                if(clean.length < 3) return;

                const nums = clean.match(/(\d+[\.,]\d{1,2})|(\d+)/g);
                const val = nums ? parseFloat(nums[nums.length-1].replace(',', '.')) : 0;
                let type = clean.toUpperCase().includes(' E') ? 'E' : 'TV';
                let concept = clean.replace(/[0-9,.]/g, '').replace(/\b(TV|E)\b/gi, '').trim();

                rows.push({ concepto: concept || "Nota", tipo: type, valor: val });
                count++;
            });
            if(count === 0) addRow();
            save();
            render();
        }

        function addRow() {
            rows.push({ concepto: "", tipo: "TV", valor: 0 });
            save(); render();
        }

        function save() { localStorage.setItem('smart_v17', JSON.stringify(rows)); }

        function render() {
            const tbody = document.getElementById('tbody');
            if(rows.length > 0) {
                document.getElementById('summary').style.opacity = "1";
                document.getElementById('btn-pdf').classList.remove('hidden');
                document.getElementById('hint').classList.add('hidden');
            }
            tbody.innerHTML = '';
            let tTV = 0, tE = 0;
            rows.forEach((r, i) => {
                if(r.tipo === 'TV') tTV += r.valor; else tE += r.valor;
                const tr = document.createElement('tr');
                tr.className = "border-t border-white/5";
                tr.innerHTML = `
                    <td class="p-4"><input type="text" value="${r.concepto}" onchange="upd(${i},'concepto',this.value)"></td>
                    <td class="p-4 text-center">
                        <select onchange="upd(${i},'tipo',this.value)" class="font-bold ${r.tipo==='TV'?'text-blue-400':'text-orange-400'}">
                            <option value="TV" ${r.tipo==='TV'?'selected':''}>TV</option>
                            <option value="E" ${r.tipo==='E'?'selected':''}>E</option>
                        </select>
                    </td>
                    <td class="p-4 text-right">
                        <input type="number" step="0.01" value="${r.valor}" onchange="upd(${i},'valor',this.value)" class="w-16 text-right font-black">
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('total-tv').innerText = tTV.toLocaleString('es-ES') + ' €';
            document.getElementById('total-e').innerText = tE.toLocaleString('es-ES') + ' €';
        }

        function upd(i,f,v) {
            rows[i][f] = f==='valor' ? parseFloat(v)||0 : v;
            save(); render();
        }

        document.getElementById('capture-btn').addEventListener('click', processImage);
        window.onload = start;
    </script>
</body>
</html>
