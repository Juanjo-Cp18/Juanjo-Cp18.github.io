<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartScan Pro - v3.0</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
.glass { background: rgba(15,23,42,0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
footer { padding: 20px; text-align: center; font-size: 10px; color: #475569; font-weight: 900; letter-spacing: 5px; }
</style>
</head>

<body class="min-h-screen flex flex-col">

<header class="p-5 bg-[#020617]/95 border-b border-emerald-500/20">
<h1 class="text-xl font-black text-emerald-500 italic">
SMARTSCAN <span class="text-white text-sm not-italic">3.0</span>
</h1>
<p class="text-[10px] text-emerald-500/60 font-bold uppercase">
OCR Estructurado por Columnas
</p>
</header>

<main class="p-4 space-y-4 flex-1">

<div class="relative rounded-[2rem] overflow-hidden border-2 border-emerald-500/30 bg-black aspect-[4/5] shadow-2xl">
<video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
<div id="loader" class="absolute inset-0 bg-black/95 hidden flex items-center justify-center z-50">
<div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
</div>
</div>

<div class="flex justify-center py-4">
<button id="capture-btn"
class="w-24 h-24 rounded-full bg-emerald-500 text-slate-950 flex items-center justify-center active:scale-90 transition-all">
<i class="fas fa-expand text-3xl"></i>
</button>
</div>

<div class="glass rounded-[2rem] overflow-hidden mb-10">
<table class="w-full text-xs text-left">
<thead class="bg-emerald-500/10 text-emerald-500 text-[9px] uppercase font-black">
<tr>
<th class="p-4">Concepto</th>
<th class="p-4 text-center">Tipo</th>
<th class="p-4 text-right">Importe</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</main>

<footer>VERSIÓN 3.0</footer>
<canvas id="canvas" class="hidden"></canvas>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const loader = document.getElementById('loader');
const captureBtn = document.getElementById('capture-btn');

let worker;
let rows = [];

async function init(){

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment", width:1920}
});
video.srcObject = stream;

worker = await Tesseract.createWorker();
await worker.loadLanguage('spa');
await worker.initialize('spa');
await worker.setParameters({ tessedit_pageseg_mode: 6 });

}

async function process(){

loader.classList.remove('hidden');
rows = [];

const ctx = canvas.getContext('2d');
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
ctx.filter = "contrast(1.8) grayscale(1)";
ctx.drawImage(video,0,0);

const width = canvas.width;
const height = canvas.height;

// DIVIDIR EN 3 COLUMNAS (ajustable)
const col1 = { x:0, w: width*0.55 };
const col2 = { x: width*0.55, w: width*0.15 };
const col3 = { x: width*0.70, w: width*0.30 };

async function readColumn(col){

const temp = document.createElement("canvas");
temp.width = col.w;
temp.height = height;

const tctx = temp.getContext("2d");
tctx.drawImage(canvas, col.x, 0, col.w, height, 0, 0, col.w, height);

const { data } = await worker.recognize(temp);
return data.text.split("\n").map(l=>l.trim()).filter(l=>l.length>0);

}

const conceptos = await readColumn(col1);
const tipos = await readColumn(col2);
const importes = await readColumn(col3);

const maxRows = Math.max(conceptos.length, tipos.length, importes.length);

for(let i=0;i<maxRows;i++){

let concepto = conceptos[i] || "";
let tipo = (tipos[i] || "").toUpperCase();
let importeRaw = importes[i] || "";

if(!/^(TV|E)$/.test(tipo)) continue;

const match = importeRaw.match(/\d{1,4}([.,]\d{2})/);
if(!match) continue;

const valor = parseFloat(match[0].replace(",","."));
if(isNaN(valor)) continue;

rows.push({
concepto: concepto,
tipo: tipo,
valor: valor
});

}

render();
loader.classList.add('hidden');
}

function render(){

const tbody=document.getElementById('tbody');
tbody.innerHTML="";

rows.forEach(r=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td class="p-4">${r.concepto}</td>
<td class="p-4 text-center">${r.tipo}</td>
<td class="p-4 text-right">${r.valor.toFixed(2)}€</td>
`;
tbody.appendChild(tr);
});

}

captureBtn.onclick=process;
window.onload=init;

</script>

</body>
</html>
