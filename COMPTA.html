<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartScan Pro - v2.4</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
.glass { background: rgba(15,23,42,0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
.row-item:nth-child(even) { background: rgba(255,255,255,0.03); }
footer { padding: 20px; text-align: center; font-size: 10px; color: #475569; font-weight: 900; letter-spacing: 5px; }
</style>
</head>

<body class="min-h-screen flex flex-col">

<header class="p-5 sticky top-0 bg-[#020617]/95 border-b border-emerald-500/20 flex justify-between items-center">
<div>
<h1 class="text-xl font-black text-emerald-500 italic">
SMARTSCAN <span class="text-white text-sm not-italic">2.4</span>
</h1>
<p id="status" class="text-[10px] text-emerald-500/60 font-bold uppercase">
OCR Profesional Inicializado
</p>
</div>
</header>

<main class="p-4 space-y-4 flex-1">

<div class="relative rounded-[2rem] overflow-hidden border-2 border-emerald-500/30 bg-black aspect-[4/5] shadow-2xl">
<video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
<div id="loader" class="absolute inset-0 bg-black/95 hidden flex items-center justify-center z-50">
<div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
</div>
</div>

<div class="flex justify-center py-4">
<button id="capture-btn"
class="w-24 h-24 rounded-full bg-emerald-500 text-slate-950 flex items-center justify-center active:scale-90 transition-all">
<i class="fas fa-expand text-3xl"></i>
</button>
</div>

<div class="glass rounded-[2rem] overflow-hidden mb-10">
<table class="w-full text-xs text-left">
<thead class="bg-emerald-500/10 text-emerald-500 text-[9px] uppercase font-black">
<tr>
<th class="p-4">Concepto</th>
<th class="p-4 text-right">Importe</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</main>

<footer>VERSIÓN 2.4</footer>
<canvas id="canvas" class="hidden"></canvas>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const loader = document.getElementById('loader');
const captureBtn = document.getElementById('capture-btn');

let rows = [];
let worker;

async function initCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment", width:1920}
});
video.srcObject = stream;
}

async function initOCR(){

worker = await Tesseract.createWorker({
logger: m => console.log(m)
});

await worker.loadLanguage('spa');
await worker.initialize('spa');
await worker.setParameters({
tessedit_pageseg_mode: 6
});

console.log("OCR listo");
}

async function process(){

loader.classList.remove('hidden');

const ctx = canvas.getContext('2d');
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.filter = "contrast(1.8) grayscale(1) brightness(1.1)";
ctx.drawImage(video,0,0);

const { data } = await worker.recognize(canvas);

console.log("TEXTO DETECTADO:");
console.log(data.text);

if(!data.text || data.text.trim().length < 3){
alert("No se detectó texto");
loader.classList.add('hidden');
return;
}

rows = [];

const lines = data.text.split("\n");

lines.forEach(line=>{

let clean = line.trim();
if(clean.length < 4) return;

const match = clean.match(/(\d{1,4}([.,]\d{1,2})?)\s*$/);
if(!match) return;

const value = parseFloat(match[1].replace(",","."));
if(isNaN(value) || value<=0) return;

let concept = clean.replace(match[0],"").trim();
if(concept.length<2) return;

rows.push({
concepto: concept,
valor: value
});

});

render();
loader.classList.add('hidden');
}

function render(){
const tbody=document.getElementById('tbody');
tbody.innerHTML="";

rows.forEach(r=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td class="p-4">${r.concepto}</td>
<td class="p-4 text-right">${r.valor.toFixed(2)}€</td>
`;
tbody.appendChild(tr);
});
}

captureBtn.onclick=process;

window.onload = async ()=>{
await initCamera();
await initOCR();
};

</script>

</body>
</html>
